services:

  # new solr including initializing core
  solr-addresses:
    image: solr:10.0.0
    container_name: solr-addresses
    ports:
      - "8984:8983"
    volumes:
      - ./solr-data:/var/solr
      - ./solr_test/configsets/addresses:/opt/solr/server/solr/configsets/addresses:ro
    command:
      - solr-precreate
      - addresses
      - /opt/solr/server/solr/configsets/addresses

  # --- Apache Solr (Address Index) ---
  solr:
    image: solr:9
    container_name: geocoder_solr
    restart: unless-stopped
    environment:
      SOLR_JAVA_MEM: "-Xms2g -Xmx4g"
    volumes:
      - ./solr:/var/solr
    # for Production dont expose port
    ports:
      - "8983:8983"
    command: ["solr-precreate", "addresses"]
    networks:
      - docker_shared_net

  # --- Flask Application ---
  web:
    build: ./backend
    container_name: geocoder_web
    restart: unless-stopped
    environment:
      FLASK_ENV: production
      PYTHONUNBUFFERED: 1 # easier debugging for development, should be 0 for PROD
      OGC_CONFIG_FILE: "conf.json" # if you want to use a different conf file define it here
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
    networks:
      - docker_shared_net

networks:
  docker_shared_net:
    external: true

